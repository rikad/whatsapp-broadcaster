name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build standalone binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (macOS arm64)
        run: bun build --compile --external typescript --target=bun-darwin-arm64 ./server.js --outfile dist/whatsapp-broadcaster-darwin-arm64

      - name: Build (macOS x64)
        run: bun build --compile --external typescript --target=bun-darwin-x64 ./server.js --outfile dist/whatsapp-broadcaster-darwin-x64

      - name: Build (Linux x64)
        run: bun build --compile --external typescript --target=bun-linux-x64 ./server.js --outfile dist/whatsapp-broadcaster-linux-x64

      - name: Build (Windows x64)
        run: bun build --compile --external typescript --target=bun-windows-x64 ./server.js --outfile dist/whatsapp-broadcaster-windows-x64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-broadcaster-binaries
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
